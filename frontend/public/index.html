<!DOCTYPE html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#7C3AED" />
    
    <title>GiftWizard — Умный подбор подарков с помощью ИИ</title>
    <meta name="description" content="Найдите идеальный подарок для любого человека. AI-помощник, геолокация, поиск по маркетплейсам. Бесплатный тест для подбора подарка." />
    <meta name="keywords" content="подарок, выбор подарка, ии подарки, маркетплейсы, геолокация" />
    <meta name="author" content="GiftWizard Team" />
    <meta name="robots" content="index, follow" />
    
    <!-- Open Graph -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://giftwizard.com/" />
    <meta property="og:title" content="GiftWizard — Умный подбор подарков с помощью ИИ" />
    <meta property="og:description" content="Найдите идеальный подарок для любого человека. AI-помощник, геолокация, поиск по маркетплейсам." />
    <meta property="og:image" content="https://giftwizard.com/og-image.jpg" />
    
    <!-- Twitter -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:url" content="https://giftwizard.com/" />
    <meta name="twitter:title" content="GiftWizard — Умный подбор подарков с помощью ИИ" />
    <meta name="twitter:description" content="Найдите идеальный подарок для любого человека. AI-помощник, геолокация, поиск по маркетплейсам." />
    <meta name="twitter:image" content="https://giftwizard.com/og-image.jpg" />
    
    <!-- Preconnect -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="preconnect" href="https://api.giftwizard.com" />
    
    <!-- Preload critical assets -->
    <link rel="preload" href="/fonts/inter-var.woff2" as="font" type="font/woff2" crossorigin />
    <link rel="preload" href="/logo.svg" as="image" />
    
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,100..900&display=swap" rel="stylesheet" />
    
    <!-- Canonical -->
    <link rel="canonical" href="https://giftwizard.com/" />
    
    <!-- PWA -->
    <link rel="manifest" href="/manifest.json" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png" />
    <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png" />
    
    <!-- Critical CSS -->
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      body {
        font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        min-height: 100vh;
        opacity: 0;
        transition: opacity 0.3s ease-in-out;
      }
      body.loaded { opacity: 1; }
      #root { min-height: 100vh; }
      .initial-loader {
        position: fixed;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        text-align: center;
        color: white;
        z-index: 9999;
      }
      @keyframes spin {
        0% { transform: rotate(0deg); }
        100% { transform: rotate(360deg); }
      }
    </style>
  </head>
  <body>
    <div id="initial-loader" class="initial-loader">
      <svg width="48" height="48" viewBox="0 0 24 24" fill="none">
        <circle cx="12" cy="12" r="10" stroke="white" stroke-width="2" stroke-opacity="0.3" />
        <path d="M12 2a10 10 0 0 1 10 10" stroke="white" stroke-width="2" stroke-linecap="round">
          <animateTransform attributeName="transform" type="rotate" from="0 12 12" to="360 12 12" dur="1s" repeatCount="indefinite" />
        </path>
      </svg>
      <p style="margin-top: 16px; font-size: 14px; opacity: 0.9;">Загружаем GiftWizard...</p>
    </div>
    <div id="root"></div>
    <noscript>
      <div style="position: fixed; top: 0; left: 0; right: 0; background: #ef4444; color: white; padding: 16px; text-align: center;">
        ⚠️ Для работы GiftWizard необходимо включить JavaScript
      </div>
    </noscript>
    <script>
      const observer = new MutationObserver((mutations) => {
        const root = document.getElementById('root');
        if (root && root.children.length > 0) {
          const loader = document.getElementById('initial-loader');
          if (loader) {
            loader.style.opacity = '0';
            setTimeout(() => loader.remove(), 300);
          }
          document.body.classList.add('loaded');
          observer.disconnect();
        }
      });
      observer.observe(document.getElementById('root'), { childList: true, subtree: true });
    </script>
  </body>
</html>
