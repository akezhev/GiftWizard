        <!-- Критичный CSS для качественного контента (встроенный для повышения производительности) -->
        <style>
        /* Критический CSS для первоначального рендеринга */
        * {
          margin: 0;
          padding: 0;
          box-sizing: border-box;
        }
        
        body {
          font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
          background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
          min-height: 100vh;
          opacity: 0;
          transition: opacity 0.3s ease-in-out;
        }
        
        body.loaded {
          opacity: 1;
        }
        
        #root {
          min-height: 100vh;
        }
        
        /* Индикатор загрузки при загрузке JS */
        .initial-loader {
          position: fixed;
          top: 50%;
          left: 50%;
          transform: translate(-50%, -50%);
          text-align: center;
          color: white;
          z-index: 9999;
        }
        
        .initial-loader svg {
          animation: spin 1s linear infinite;
          width: 48px;
          height: 48px;
          margin-bottom: 16px;
        }
        
        @keyframes spin {
          0% { transform: rotate(0deg); }
          100% { transform: rotate(360deg); }
        }
        
        /* Accessibility */
        .visually-hidden {
          position: absolute;
          width: 1px;
          height: 1px;
          padding: 0;
          margin: -1px;
          overflow: hidden;
          clip: rect(0, 0, 0, 0);
          white-space: nowrap;
          border: 0;
        }
      </style>

    </head>
    
<body>

    <!-- Ссылка для перехода по специальным возможностям -->
    <a href="#main-content" class="visually-hidden focus:not-visually-hidden focus:absolute focus:top-4 focus:left-4 focus:z-50 focus:bg-white focus:text-purple-600 focus:p-3 focus:rounded-lg">
        Перейти к основному контенту
      </a>
      
      <!-- Начальный загрузчик (виден до тех пор, пока React не подключится) -->
      <div id="initial-loader" class="initial-loader">
        <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
          <circle cx="12" cy="12" r="10" stroke="white" stroke-width="2" stroke-opacity="0.3" />
          <path d="M12 2a10 10 0 0 1 10 10" stroke="white" stroke-width="2" stroke-linecap="round">
            <animateTransform
              attributeName="transform"
              type="rotate"
              from="0 12 12"
              to="360 12 12"
              dur="1s"
              repeatCount="indefinite"
            />
          </path>
        </svg>
        <p style="font-size: 14px; opacity: 0.9;">Загружаем GiftWizard...</p>
      </div>
      
      <!-- React mount point -->
      <div id="root"></div>
      
      <!-- Резервный вариант для браузеров без JavaScript -->
      <noscript>
        <div style="position: fixed; top: 0; left: 0; right: 0; background: #ef4444; color: white; padding: 16px; text-align: center; z-index: 10000;">
          ⚠️ Для работы GiftWizard необходимо включить JavaScript. Пожалуйста, включите JavaScript в настройках вашего браузера.
        </div>
      </noscript>
      
      <!-- Регистрация работников сферы обслуживания (PWA) -->
      <script>
        if ('serviceWorker' in navigator && process.env.NODE_ENV === 'production') {
          window.addEventListener('load', () => {
            navigator.serviceWorker.register('/sw.js')
              .then(registration => {
                console.log('SW registered: ', registration);
              })
              .catch(registrationError => {
                console.log('SW registration failed: ', registrationError);
              });
          });
        }
      </script>
      
      <!-- Google Analytics (соответствует требованиям GDPR) -->
      <script>
        // Проверьте наличие согласия пользователя
        const hasConsent = localStorage.getItem('cookieConsent') === 'true';
        
        if (hasConsent && window.location.hostname !== 'localhost') {
          window.dataLayer = window.dataLayer || [];
          function gtag(){dataLayer.push(arguments);}
          gtag('js', new Date());
          gtag('config', 'G-XXXXXXXXXX'); // Замените на свой GA4 ID
          
          // Загрузить скрипт Google Analytics
          const script = document.createElement('script');
          script.src = 'https://www.googletagmanager.com/gtag/js?id=G-XXXXXXXXXX';
          script.async = true;
          document.head.appendChild(script);
        }
      </script>
      
      <!-- Мониторинг производительности (необязательно) -->
      <script>
        // Отчет о важных показателях производительности в аналитику
        if ('web-vitals' in window && hasConsent) {
          import('web-vitals').then(({ getCLS, getFID, getFCP, getLCP, getTTFB }) => {
            getCLS(console.log);
            getFID(console.log);
            getFCP(console.log);
            getLCP(console.log);
            getTTFB(console.log);
          });
        }
      </script>
      
      <!-- Удаляем индикатор загрузки, когда React монтируется  -->
      <script>
        //Следите за установкой React (корневой элемент, имеющий дочерние элементы)
        const observer = new MutationObserver((mutations) => {
          const root = document.getElementById('root');
          if (root && root.children.length > 0) {
            const loader = document.getElementById('initial-loader');
            if (loader) {
              loader.style.opacity = '0';
              setTimeout(() => {
                loader.remove();
              }, 300);
            }
            document.body.classList.add('loaded');
            observer.disconnect();
          }
        });
        
        observer.observe(document.getElementById('root'), {
          childList: true,
          subtree: true
        });
      </script>
      
    </body>
